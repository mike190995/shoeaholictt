services:
  postgres:
    image: postgres:16-alpine
    container_name: lswoo-postgres
    environment:
      POSTGRES_USER: lswoo
      POSTGRES_PASSWORD: lswoo
      POSTGRES_DB: lswoo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lswoo-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
